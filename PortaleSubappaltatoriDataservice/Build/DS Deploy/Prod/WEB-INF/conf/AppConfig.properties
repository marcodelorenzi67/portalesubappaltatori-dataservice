###############################################################################
# Sets the path to the application work directory. The default value is the 
# absolute path to the sub-directory of the well-known JSP directory named 
# "webapps", where the application is deployed. In case of WAR deploy, set this 
# property.
#
#workDirectory=

# Sets the directory designed to store log files.
# If not specified, the default value is "WEB-INF/log".
# If the property "logDirectoryIsAbsolute" is true, the logDirectory must 
# be a valid absolute path.
#
#logDirectory=

# Specifies if the "logDirectory" must be an absolute path. The default value
# is false. If false, the logDirectory is relative to the work directory.
#
#logDirectoryIsAbsolute=true|false

# Sets the directory designed to store uploaded files.
# If not specified, the default value is "upload".
# If the property "uploadDirectoryIsAbsolute" is true, the uploadDirectory must 
# be a valid absolute path.
#
uploadDirectory=/opt/tomcat/upload

# Specifies if the "uploadDirectory" must be an absolute path. The default value
# is false. If false, the upload directory is relative to the work directory.
#
uploadDirectoryIsAbsolute=true

# The maximum size (in bytes) of a request containing file uploads.
# Can be expressed as a number followed by a "K", "M", or "G", which are 
# interpreted to mean kilobytes, megabytes, or gigabytes, respectively.
# If not specified, the default value is 250M.
#
maxUploadSize=12M

# The maximum number of uploaded files accepted in a single request (default 100).
#
#maxUploadFilesCount=100

# Sets the absolute path of the directory used for storing temporary files
# that must be shared when running in a cluster.
# If not specified, uses the system temporary directory which is not suitable
# for a clustered environment.
#
#sharedTempDirectory=

# Sets the absolute directory designed to store the report templates 
# used by the WebRatio extensions for reports generation.
# If not specified, the default value is the sub-directory "WEB-INF/descr" of
# the work directory.
#
#reportDirectory=

# The interval of periodically check of the redeployment file.
#
redeployCheckInterval=5000

# Sets the directory where the special file "_redeploy" is periodically
# checked to force a restart of the WebRatio run-time manager. The
# redeploy directory is relative to the work directory.
#
redeployDirectory=WEB-INF/descr

# The interval of periodically check the correct start of the Quartz scheduler.
#
quartzStartCheckInterval=60000

# The flag indicating if the application is in development mode (default true).
#
#developmentMode=false 

# Lists the host names through which to allow access to the application in
# addition to the local server name and IP address.
# Multiple values are separated by comma.
# If not specified or empty, only the local server name and address are allowed.
#
#hostWhitelist=

# Indicates whether to allow access through any host name.
# If not specified or disabled, allowed hosts are controlled by the 'hostWhitelist' property.
#
# ENABLING IS NOT SECURE unless behind a properly configured reverse proxy.
# Enabling on servers that are directly reachable may expose to cache poisoning attacks.
#
#hostAlwaysAllowed=false

# Lists the origin URLs (including protocol and port) that can initiate cross-origin
# requests to the application in addition to the local server origins.
# Multiple values are separated by comma.
# If not specified or empty, only origins using the local server name and address are allowed.
#
#originWhitelist=

# Indicates whether the application should preserve the incoming hostname when calling
# itself. If this setting is enabled, the application uses the hostname indicated in
# the incoming 'Host' header.
# If not specified or disabled, the application uses the local IP address to call itself.
#
#localRequestPreserveHost=false

# The maximum total number of requests that the application may process simultaneously.
# If not specified or 0, there is no global limit.
#
#requestPolicy.maxConcurrency=0

# The maximum number of requests that each endpoint may process simultaneously.
# This limit is enforced after checking for the global limit ('requestPolicy.maxConcurrency' property).
# If not specified or 0, there is no per-endpoint limit.
#
#requestPolicy.maxPerEndpointConcurrency=0

# The default number of rows returned when calling a service without an explicit 'pageSize' parameter.
# Applies to all services that support pagination, such as Class Services.
#
#defaultPageSize=500

# The timeout for the asynchronous requests.
# Responses to action or class services are processed in an asynchronous fashion.
# This async response has a timeout which Spring inherits from the servlet container it is 
# deployed into. To override this value, uncomment this property and set the millisecond value 
# you need
# 
# For Tomcat containers, the async timeout is the one specified by the asyncTimeout attribute
# of the Container tag. If such this attribute is not specified, the default value is 10 seconds.
#
#asyncTimeout=45000

# The size of the core thread pool.
# Responses to action or class services are processed in an asynchronous fashion.
# Each async request is served by a thread which is picked from a tread pool.
# Set this parameter to override the default one which is 10 
#
#threadPoolExecutor.corePoolSize=10

# The maximum size of the thread pool.
# Responses to action or class services are processed in an asynchronous fashion.
# Each async request is served by a thread which is picked from a tread pool.
# Set this parameter to override the default maximum size of the thread pool, which is Integer.MAX_VALUE.
#
# This value MUST be grater than the core pool size
#
#threadPoolExecutor.maxPoolSize=1000

# A comma separated list of classes implementing the ExecutionContextLogger interface, enabled to perform context logging.
# Each class can be specified either with its simple name or with its fully qualified name.
# When an execution context logger is added to this list, it is enabled to perform logging. 
# This acts just like the presence of an appender to the classic logging system, no matter the level. 
#
#enabledExecutionContextLoggers=DefaultActionServiceExecutionContextLogger

# The size of the execution context logging thread pool.
# Logging of execution context is processed in an asynchronous fashion, to avoid overhead to the normal execution flow.
# Each execution context logging request is served by a thread which is picked from a tread pool.
# Set this parameter to override the default one which is 10 
#
#contextLoggerThreadPoolExecutor.corePoolSize=10

# The maximum size of the execution context logging thread pool.
# Logging of execution context is processed in an asynchronous fashion, to avoid overhead to the normal execution flow.
# Each execution context logging request is served by a thread which is picked from a tread pool.
# Set this parameter to override the default maximum size of the thread pool, which is 100.
#
# This value MUST be grater than the core pool size
#
#contextLoggerThreadPoolExecutor.maxPoolSize=100

# The size of the execution context logging requests queue.
# This is the max number of execution context logging requests that can be handled before they are rejected because there is no more space to save them.
# It means that, if all the threads in the pool are taken, any further request will be queued up to this value, after which then will be rejected.
# Set this parameter to override the default one which is 1000 
#
#contextLoggerThreadPoolExecutor.queueSize=1000

# The fully qualified name of the class providing the logging service implementation.
# The class must implement the interface com.webratio.log.service.LoggingService.
# The default is to use the built-in implementation based on Log4j 2.
#
#loggingServiceClassName=com.webratio.log.log4j2.Log4j2Service

# The size of the row window used when writing an XLSX file leveraging the streaming feature of POI.
# It represents the maximum number of rows kept in memory before they are flushed to the output file.
# The default value is 100.
# 
#xlsxOutputStreamWindowSize=100

# The size of the row window used when reading an XLSX file leveraging the streaming feature of a third party library
# which implements the streaming interfaces of POI.
# It represents the maximum number of rows kept in memory while reading an XLSX file.
# The default value is 10000.
# 
#xlsxInputStreamWindowSize=10000
